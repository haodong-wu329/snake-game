<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐍 贪吃蛇游戏</h1>
        </header>
        
        <div class="game-info">
            <div class="score-board">
                <span class="score-label">分数：</span>
                <span id="score" class="score-value">0</span>
            </div>
            <div class="difficulty-selector">
                <label for="difficulty">难度：</label>
                <select id="difficulty">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>
        
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="gameOverlay" class="game-overlay">
                <div class="overlay-content">
                    <h2 id="overlayTitle">准备开始</h2>
                    <p id="overlayMessage">按"开始游戏"按钮或空格键开始</p>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn btn-start">开始游戏</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>暂停</button>
            <button id="restartBtn" class="btn btn-restart" disabled>重新开始</button>
        </div>
        
        <div class="game-instructions">
            <h3>游戏说明</h3>
            <ul>
                <li>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向键控制蛇的移动</li>
                <li>吃到食物可以增加分数和蛇的长度</li>
                <li>碰到边界或自己的身体时游戏结束</li>
                <li>按 <kbd>空格</kbd> 键可以开始/暂停游戏</li>
                <li>选择不同难度会影响蛇的移动速度</li>
            </ul>
        </div>
        
        <div class="sound-control">
            <label>
                <input type="checkbox" id="soundToggle" checked>
                音效开启
            </label>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
