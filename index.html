<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>经典贪吃蛇</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      touch-action: none;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
    }

    .score-board {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      color: #fff;
      font-size: 12px;
      padding: 0 10px;
    }

    .score {
      color: #00ff88;
    }

    .high-score {
      color: #ffd93d;
    }

    #gameCanvas {
      border: 3px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3),
                  inset 0 0 60px rgba(0, 0, 0, 0.5);
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      opacity: 1;
      transition: opacity 0.3s ease;
      pointer-events: auto;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay h1 {
      color: #00ff88;
      font-size: 24px;
      text-shadow: 0 0 20px #00ff88;
      text-align: center;
      line-height: 1.6;
    }

    .overlay p {
      color: #fff;
      font-size: 10px;
      text-align: center;
      line-height: 2;
    }

    .overlay .final-score {
      color: #ff6b6b;
      font-size: 16px;
    }

    .btn {
      background: linear-gradient(145deg, #00ff88, #00cc6a);
      color: #1a1a2e;
      border: none;
      padding: 15px 40px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(0, 255, 136, 0.6);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .canvas-wrapper {
      position: relative;
      max-width: calc(100vw - 40px);
    }

    .controls-mobile {
      display: none;
      gap: 10px;
      margin-top: 20px;
    }

    .control-row {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      background: rgba(0, 255, 136, 0.2);
      border: 2px solid #00ff88;
      border-radius: 12px;
      color: #00ff88;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s, transform 0.1s;
    }

    .control-btn:active {
      background: rgba(0, 255, 136, 0.5);
      transform: scale(0.95);
    }

    .control-btn.placeholder {
      visibility: hidden;
    }

    .instructions {
      color: #666;
      font-size: 8px;
      text-align: center;
      margin-top: 15px;
    }

    @media (max-width: 480px) {
      .score-board {
        font-size: 10px;
      }

      .controls-mobile {
        display: flex;
        flex-direction: column;
      }

      .instructions {
        display: none;
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .score-bounce {
      animation: bounce 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="score-board">
      <div>分数: <span id="score" class="score">0</span></div>
      <div>最高分: <span id="highScore" class="high-score">0</span></div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div id="startOverlay" class="overlay">
        <h1>🐍 经典贪吃蛇</h1>
        <p>使用方向键控制蛇的移动<br>吃到食物得分，注意不要撞墙或咬到自己！</p>
        <button class="btn" id="startBtn">开始游戏</button>
        <p class="instructions">空格键: 暂停 | Enter: 重新开始</p>
      </div>

      <div id="pauseOverlay" class="overlay hidden">
        <h1>⏸️ 游戏暂停</h1>
        <button class="btn" id="resumeBtn">继续游戏</button>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <h1>💀 游戏结束</h1>
        <p>你的得分: <span id="finalScore" class="final-score">0</span></p>
        <button class="btn" id="restartBtn">再玩一次</button>
      </div>
    </div>

    <div class="controls-mobile" id="mobileControls">
      <div class="control-row">
        <div class="control-btn placeholder"></div>
        <div class="control-btn" data-dir="up">▲</div>
        <div class="control-btn placeholder"></div>
      </div>
      <div class="control-row">
        <div class="control-btn" data-dir="left">◀</div>
        <div class="control-btn" data-dir="down">▼</div>
        <div class="control-btn" data-dir="right">▶</div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 音效管理 ====================
    class AudioManager {
      constructor() {
        this.ctx = null;
        this.enabled = true;
        try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          this.enabled = false;
        }
      }

      resume() {
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playEat() {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.1);
      }

      playGameOver() {
        if (!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + 0.3);
      }
    }

    // ==================== 蛇身段 ====================
    class Segment {
      constructor(x, y) {
        this.x = x;
        this.y = y;
      }
    }

    // ==================== 蛇类 ====================
    class Snake {
      constructor(gridSize) {
        this.gridSize = gridSize;
        this.reset();
      }

      reset() {
        const startX = Math.floor(10);
        const startY = Math.floor(10);
        this.segments = [
          new Segment(startX, startY),
          new Segment(startX - 1, startY),
          new Segment(startX - 2, startY)
        ];
        this.direction = { x: 1, y: 0 };
        this.nextDirection = { x: 1, y: 0 };
        this.growing = false;
      }

      setDirection(x, y) {
        if (this.direction.x === -x && this.direction.y === -y) return;
        if (this.direction.x === x && this.direction.y === y) return;
        this.nextDirection = { x, y };
      }

      update() {
        this.direction = { ...this.nextDirection };
        const head = this.segments[0];
        const newHead = new Segment(
          head.x + this.direction.x,
          head.y + this.direction.y
        );
        this.segments.unshift(newHead);
        if (!this.growing) {
          this.segments.pop();
        }
        this.growing = false;
      }

      grow() {
        this.growing = true;
      }

      checkCollision(width, height) {
        const head = this.segments[0];
        if (head.x < 0 || head.x >= width || head.y < 0 || head.y >= height) {
          return true;
        }
        for (let i = 1; i < this.segments.length; i++) {
          if (head.x === this.segments[i].x && head.y === this.segments[i].y) {
            return true;
          }
        }
        return false;
      }

      occupies(x, y) {
        return this.segments.some(seg => seg.x === x && seg.y === y);
      }
    }

    // ==================== 食物类 ====================
    class Food {
      constructor() {
        this.x = 0;
        this.y = 0;
        this.pulsePhase = 0;
      }

      spawn(gridWidth, gridHeight, snake) {
        let attempts = 0;
        do {
          this.x = Math.floor(Math.random() * gridWidth);
          this.y = Math.floor(Math.random() * gridHeight);
          attempts++;
        } while (snake.occupies(this.x, this.y) && attempts < 100);
        this.pulsePhase = 0;
      }

      update() {
        this.pulsePhase += 0.1;
      }

      getPulseScale() {
        return 0.8 + Math.sin(this.pulsePhase) * 0.4;
      }
    }

    // ==================== 游戏主类 ====================
    class Game {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.gridSize = 20;
        this.gridWidth = 20;
        this.gridHeight = 20;

        this.audio = new AudioManager();
        this.snake = new Snake(this.gridSize);
        this.food = new Food();

        this.state = 'START';
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        this.speed = 120;
        this.lastUpdate = 0;
        this.gameOverFlash = 0;

        this.setupCanvas();
        this.bindEvents();
        this.updateScoreDisplay();
        this.gameLoop();
      }

      setupCanvas() {
        const maxSize = Math.min(400, window.innerWidth - 40);
        this.canvas.width = maxSize;
        this.canvas.height = maxSize;
        this.cellSize = maxSize / this.gridSize;
      }

      bindEvents() {
        document.addEventListener('keydown', (e) => this.handleKeyDown(e));

        document.getElementById('startBtn').addEventListener('click', () => this.startGame());
        document.getElementById('resumeBtn').addEventListener('click', () => this.resumeGame());
        document.getElementById('restartBtn').addEventListener('click', () => this.startGame());

        document.querySelectorAll('.control-btn[data-dir]').forEach(btn => {
          btn.addEventListener('click', () => {
            const dir = btn.dataset.dir;
            const dirMap = {
              'up': { x: 0, y: -1 },
              'down': { x: 0, y: 1 },
              'left': { x: -1, y: 0 },
              'right': { x: 1, y: 0 }
            };
            if (dirMap[dir]) {
              this.snake.setDirection(dirMap[dir].x, dirMap[dir].y);
              if (this.state === 'START') this.startGame();
            }
          });
        });

        let touchStartX = 0;
        let touchStartY = 0;

        this.canvas.addEventListener('touchstart', (e) => {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
          this.audio.resume();
        }, { passive: true });

        this.canvas.addEventListener('touchend', (e) => {
          if (this.state === 'PLAYING') {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const minSwipe = 30;

            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
              this.snake.setDirection(dx > 0 ? 1 : -1, 0);
            } else if (Math.abs(dy) > minSwipe) {
              this.snake.setDirection(0, dy > 0 ? 1 : -1);
            }
          } else if (this.state === 'PLAYING' || this.state === 'PAUSED') {
            this.togglePause();
          }
        }, { passive: true });

        window.addEventListener('resize', () => {
          this.setupCanvas();
        });
      }

      handleKeyDown(e) {
        const keyMap = {
          'ArrowUp': { x: 0, y: -1 },
          'ArrowDown': { x: 0, y: 1 },
          'ArrowLeft': { x: -1, y: 0 },
          'ArrowRight': { x: 1, y: 0 }
        };

        if (keyMap[e.key]) {
          e.preventDefault();
          this.snake.setDirection(keyMap[e.key].x, keyMap[e.key].y);
          if (this.state === 'START') this.startGame();
        } else if (e.key === ' ') {
          e.preventDefault();
          if (this.state === 'PLAYING' || this.state === 'PAUSED') {
            this.togglePause();
          }
        } else if (e.key === 'Enter') {
          if (this.state === 'START' || this.state === 'GAME_OVER') {
            this.startGame();
          }
        }
      }

      startGame() {
        this.audio.resume();
        this.snake.reset();
        this.food.spawn(this.gridWidth, this.gridHeight, this.snake);
        this.score = 0;
        this.updateScoreDisplay();
        this.state = 'PLAYING';
        this.hideAllOverlays();
      }

      resumeGame() {
        this.state = 'PLAYING';
        this.hideAllOverlays();
      }

      togglePause() {
        if (this.state === 'PLAYING') {
          this.state = 'PAUSED';
          document.getElementById('pauseOverlay').classList.remove('hidden');
        } else if (this.state === 'PAUSED') {
          this.state = 'PLAYING';
          document.getElementById('pauseOverlay').classList.add('hidden');
        }
      }

      hideAllOverlays() {
        document.getElementById('startOverlay').classList.add('hidden');
        document.getElementById('pauseOverlay').classList.add('hidden');
        document.getElementById('gameOverOverlay').classList.add('hidden');
      }

      gameOver() {
        this.state = 'GAME_OVER';
        this.audio.playGameOver();
        this.gameOverFlash = 6;

        if (this.score > this.highScore) {
          this.highScore = this.score;
          localStorage.setItem('snakeHighScore', this.highScore);
          this.updateScoreDisplay();
        }

        document.getElementById('finalScore').textContent = this.score;
        setTimeout(() => {
          document.getElementById('gameOverOverlay').classList.remove('hidden');
        }, 500);
      }

      updateScoreDisplay() {
        const scoreEl = document.getElementById('score');
        scoreEl.textContent = this.score;
        scoreEl.classList.remove('score-bounce');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('score-bounce');

        document.getElementById('highScore').textContent = this.highScore;
      }

      update(timestamp) {
        if (this.state !== 'PLAYING') return;

        if (timestamp - this.lastUpdate >= this.speed) {
          this.lastUpdate = timestamp;

          this.snake.update();

          const head = this.snake.segments[0];
          if (head.x === this.food.x && head.y === this.food.y) {
            this.snake.grow();
            this.score += 10;
            this.updateScoreDisplay();
            this.audio.playEat();
            this.food.spawn(this.gridWidth, this.gridHeight, this.snake);
          }

          if (this.snake.checkCollision(this.gridWidth, this.gridHeight)) {
            this.gameOver();
          }
        }

        this.food.update();
      }

      draw() {
        const ctx = this.ctx;
        const cellSize = this.cellSize;

        // 背景
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // 网格线
        ctx.strokeStyle = '#16213e';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= this.gridWidth; i++) {
          ctx.beginPath();
          ctx.moveTo(i * cellSize, 0);
          ctx.lineTo(i * cellSize, this.canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, i * cellSize);
          ctx.lineTo(this.canvas.width, i * cellSize);
          ctx.stroke();
        }

        // 食物
        const foodScale = this.food.getPulseScale();
        const foodX = this.food.x * cellSize + cellSize / 2;
        const foodY = this.food.y * cellSize + cellSize / 2;
        const foodRadius = (cellSize / 2 - 2) * foodScale;

        ctx.beginPath();
        ctx.arc(foodX, foodY, foodRadius + 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 107, 107, 0.3)';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(foodX, foodY, foodRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#ff6b6b';
        ctx.fill();

        // 蛇
        const shouldDrawSnake = this.gameOverFlash <= 0 || Math.floor(this.gameOverFlash) % 2 === 0;

        if (shouldDrawSnake) {
          this.snake.segments.forEach((seg, i) => {
            const x = seg.x * cellSize;
            const y = seg.y * cellSize;
            const padding = 1;

            if (i === 0) {
              ctx.fillStyle = '#00ff88';
              ctx.shadowColor = '#00ff88';
              ctx.shadowBlur = 10;
            } else {
              const ratio = 1 - (i / this.snake.segments.length) * 0.4;
              const r = Math.floor(0 + (0 - 0) * ratio);
              const g = Math.floor(204 * ratio);
              const b = Math.floor(106 * ratio);
              ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
              ctx.shadowBlur = 0;
            }

            ctx.beginPath();
            ctx.roundRect(
              x + padding,
              y + padding,
              cellSize - padding * 2,
              cellSize - padding * 2,
              4
            );
            ctx.fill();
            ctx.shadowBlur = 0;
          });
        }

        if (this.gameOverFlash > 0) {
          this.gameOverFlash -= 0.2;
        }
      }

      gameLoop = (timestamp = 0) => {
        this.update(timestamp);
        this.draw();
        requestAnimationFrame(this.gameLoop);
      }
    }

    // ==================== 初始化游戏 ====================
    window.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('gameCanvas');
      new Game(canvas);
    });
  </script>
</body>
</html>
